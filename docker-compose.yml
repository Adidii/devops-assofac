version: '3.8'

services:

  app:
    build: ./app
    container_name: assofac-app
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=assofacdb
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: assofac-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=assofacdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: