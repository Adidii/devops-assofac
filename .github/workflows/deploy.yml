name: Deploy AssofacCloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/assofac-app:latest ./app
          docker build -t ${{ secrets.DOCKER_USERNAME }}/assofac-app:${{ github.sha }} ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/assofac-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/assofac-app:${{ github.sha }}

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER: ${{ secrets.SERVER_IP }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key.pem
          chmod 400 /tmp/deploy_key.pem
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key.pem ubuntu@$SERVER "
            docker pull $DOCKER_USER/assofac-app:latest &&
            cd ~/app && docker-compose up -d --force-recreate
          "